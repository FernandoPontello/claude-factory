# Adapter Azure DevOps — manifesto de dados do contrato canônico (.claude/factory-process.md)
# Destino no repo: .claude/adapters/azure-devops/manifest.yaml
# Tools pinados contra o TOOLSET oficial do microsoft/azure-devops-mcp.
# Nota: clientes podem exibir os nomes com namespace (ex: mcp_ado_wit_create_work_item);
# o resolve do /setup casa por sufixo. O /setup valida cada tool via tools/list.
#
# Hierarquia: epic→Epic, feature→Feature, task→USER STORY (nível-requisito, nativo e VISÍVEL no
#   board/backlog sob a Feature). O tipo nativo "Task" do ADO (passo de hora) NÃO é usado pela
#   factory. Tempo→campo nativo CompletedWork (horas) na User Story — esse campo é de Task/Bug por
#   padrão, então o processo Factory o ADICIONA (campo existente) ao WIT User Story (ADMIN-SETUP §2.2).
# Conexão: LOCAL stdio + azcli (headless via `az login` na máquina); o remoto Entra/OAuth ainda
#   NÃO suporta o Claude Code como cliente — ver ADAPTER.md §1.
# Formas de argumento: alinhadas ao schema real do toolset — wit_create_work_item.fields[] (lista
#   {name,value,format?}), wit_add_child_work_items.items[] (lista {title,description,format?}),
#   wit_update_work_item.updates[] (patches {op,path,value}), wit_work_items_link.updates[]. São
#   VALIDADAS pelo /setup via resolve.check: tool_arg_schemas; o smoke (ADAPTER §5) é a prova em runtime.

provider: azure-devops

mcp:
  preferred: local                        # o board-writer roda como sub-agent HEADLESS: precisa de credencial sem
                                          # browser. O servidor inline não herda OAuth de servidor de sessão e não
                                          # abre browser — por isso local+azcli, não o remoto Entra. Ver ADAPTER.md §1.
  local:                                  # stdio (Node 20+); credencial estabelecida FORA DE BANDA (az login), usada headless
    transport: stdio
    command: npx
    args: ["-y", "@azure-devops/mcp", "${binding.organization}",
           "-d", "core", "work-items", "search", "wiki",
           "--authentication", "azcli"]   # cada operador roda `az login` 1x na máquina; alt. headless: pat | envvar — ADAPTER.md §1
  remote:                                 # FUTURO — public preview; hoje só VS / VS Code (Copilot), NÃO Claude Code (ADAPTER.md §1)
    transport: http
    url: "https://mcp.dev.azure.com/${binding.organization}"
    # Auth: Entra ID (OAuth interativo). Quando o Claude Code virar cliente suportado, avaliar preferred: remote.
    # Headers de endurecimento aceitos: X-MCP-Toolsets / X-MCP-Readonly.

binding:                                  # validado/persistido pelo /setup no kanban-config.json
  organization: "${kanban-config.board.organization}"
  project: "${kanban-config.board.project}"

entities:
  epic: "Epic"                            # work item type
  feature: "Feature"
  task: "User Story"                      # a task canônica (1 commit + ACs) é, em ADO, uma User Story — filha
                                          # nativa e VISÍVEL da Feature. O tipo "Task" do ADO não é usado pela factory.

states:                                   # System.State da Feature — exige o processo herdado "Factory" (conduzido pelo /setup via prerequisites:)
  ready: "Ready"
  design: "Design"
  in_progress: "In Progress"
  review: "Review"
  done: "Done"
  closed: "Closed"

task_done_state: "Closed"                 # User Story (Agile, estados de FÁBRICA — não customizados): New → Active → Resolved → Closed

prerequisites:    # conduzidos pelo /setup — verifica por evidência; pergunta só o inverificável
  - id: mcp_connection
    verify: { mcp: tools_list_responds }     # com azcli, esta verificação só passa se `az login` já foi feito NESTA máquina
    fix: |
      O board-writer roda headless (sub-agent): a credencial tem de estar na MÁQUINA, sem
      browser em runtime. Caminho atual = servidor LOCAL stdio + azcli (o remoto Entra/OAuth
      ainda não suporta Claude Code — ADAPTER.md §1). Nesta máquina, uma vez:
        1. Instale Node 20+ e a Azure CLI; convide o operador na org (Org settings → Users, Basic).
        2. az login          (no tenant da organização — dev.azure.com)
           az account show   (confirma o tenant certo)
      Não é preciso `claude mcp add`: o board-writer carrega o servidor inline. Reinicie a
      sessão e re-rode /setup. (Sem Azure CLI: --authentication pat|envvar com o token numa
      variável de ambiente, nunca no repo — ADAPTER.md §1.)
    note: "cada operador faz isto 1x por máquina — é o passo que falta quando 'o board não atualiza' num dev novo"
  - id: project
    input:  { ask: "Qual o nome do projeto no Azure DevOps?", bind: project }
    verify: { tool: core_list_projects, match: "name == $project" }
    fix: |
      Crie em dev.azure.com → New project (Private), escolhendo em Advanced →
      Work item process o processo "Factory" (pré-requisito seguinte).
  - id: inherited_process
    ask: "O projeto roda no processo herdado 'Factory', com (a) os 6 estados na Feature e (b) o campo Completed Work adicionado à User Story? (processo é configuração de organização — o MCP não a enxerga)"
    fix: |
      Organization settings → Boards → Process → card Agile → ⋯ → Create inherited
      process → "Factory". Em Factory:
        • work item type Feature → States:
            adicionar Ready (Proposed) · Design, In Progress e Review (In Progress) ·
            Done (Resolved); ocultar New, Active e Resolved; manter Closed (Completed).
            Com New oculto, toda Feature nasce em Ready.
        • work item type User Story → New field → aba "Use an existing field" →
            Completed Work (Microsoft.VSTS.Scheduling.CompletedWork) → Add. É onde o tempo
            é gravado; sem o campo, o primeiro complete_task falha (try-reporta-prossegue).
      A base Agile é obrigatória (hierarquia nativa Epic > Feature > User Story — a task
      da factory é uma User Story). Projeto existente em Agile migra por: Process → Agile
      → Projects → ⋯ → Change process → Factory.
    note: "divergência de nome de estado falha-rápido na 1ª transição; ausência do campo Completed Work na User Story falha-rápido no 1º complete_task (try-reporta-prossegue + /sync reparam)"

resolve:                                  # /setup roda uma vez
  - { tool: core_list_projects, expect: "binding.project presente na lista" }
  - { check: tools_list_contains, tools: [ wit_create_work_item, wit_update_work_item, wit_add_child_work_items, wit_work_items_link, wit_get_work_item, wit_get_work_items_batch_by_ids, wit_add_work_item_comment, wit_list_work_item_comments, search_workitem, wiki_list_wikis, wiki_create_or_update_page ] }
  - check: tool_arg_schemas               # valida as FORMAS de argumento, não só os nomes — drift de forma é tão real quanto de nome
    expectations:                         # uma string por tool: "args... — nota"; sufixo [] = a forma esperada é LISTA, não objeto
      wit_create_work_item:            "project?, workItemType, fields[] — fields = lista de {name, value, format?}"
      wit_add_child_work_items:        "parentId, project?, workItemType, items[] — items = lista de {title, description, format?}; workItemType único p/ todo o lote"
      wit_update_work_item:            "id, updates[] — updates = lista de patches {op, path, value}"
      wit_work_items_link:             "project?, updates[] — updates = lista de {id, linkToId, type, comment?}"
      wit_add_work_item_comment:       "project?, workItemId, comment, format?"
      search_workitem:                 "searchText, project?[], workItemType?[], state?[], top? — filtros são listas de string"
      wit_get_work_item:               "id, project?, fields?[], expand?"
      wit_get_work_items_batch_by_ids: "project?, ids[], fields?[]"
  # Estados não são listáveis via MCP: o contrato é o pré-requisito inherited_process
  # (prerequisites:); divergência de nome falha-rápido na primeira transição
  # (try-reporta-prossegue + /sync).

ops:
  create_epic:
    tool: wit_create_work_item
    args:
      project: "{binding.project}"
      workItemType: "{entities.epic}"
      fields:                             # wit_create_work_item.fields = LISTA de {name, value, format?}
        - { name: "System.Title", value: "$title" }
        - { name: "System.Description", value: "$body", format: "Markdown" }
    then:
      - tool: wit_update_work_item        # identidade viaja como tag (dinâmica no ADO)
        args:
          id: "$created_id"
          updates:                        # wit_update_work_item.updates = LISTA de patches {op, path, value}
            - { op: "add", path: "/fields/System.Tags", value: "factory-key:$key" }
    returns: id

  create_feature:                         # nasce filha do Epic, já em Ready (New está oculto no processo Factory)
    tool: wit_add_child_work_items
    args:
      parentId: "$epic_id"
      project: "{binding.project}"
      workItemType: "{entities.feature}"
      items:                              # wit_add_child_work_items.items = LISTA de {title, description, format?}
        - { title: "$title", description: "$body", format: "Markdown" }
    then:
      - tool: wit_update_work_item        # identidade viaja como tag (dinâmica no ADO)
        args:
          id: "$created_id"
          updates:
            - { op: "add", path: "/fields/System.Tags", value: "factory-key:$key" }
    returns: id

  find_by_key:                            # sem WIQL ad-hoc no toolset → busca de work items (domínio search)
    tool: search_workitem
    args: { searchText: "factory-key:$key", project: ["{binding.project}"], workItemType: ["{entities.feature}"] }
    returns: first(results).id | null     # indexação tem latência de segundos — ver ADAPTER.md §4

  move_feature:                           # estágio é o System.State nativo (stage_label: none)
    tool: wit_update_work_item
    args:
      id: "$feature_id"
      updates:
        - { op: "add", path: "/fields/System.State", value: "{states.$stage}" }
    returns: ok

  create_task:                            # task canônica = User Story filha da Feature (entities.task); nasce em "New"
    tool: wit_add_child_work_items
    args:
      parentId: "$feature_id"
      project: "{binding.project}"
      workItemType: "{entities.task}"
      items:
        - { title: "$title", description: "$body", format: "Markdown" }
    returns: id

  complete_task:                          # tempo no campo nativo CompletedWork (horas) da User Story — campo ADICIONADO ao WIT no processo Factory (ADMIN-SETUP §2.2)
    tool: wit_update_work_item
    args:
      id: "$task_id"
      updates:
        - { op: "add", path: "/fields/System.State", value: "{task_done_state}" }
    then:
      - when: "$minutes != null"
        tool: wit_update_work_item        # capability time: field — CompletedWork é Double em HORAS
        args:
          id: "$task_id"
          updates:
            - { op: "add", path: "/fields/Microsoft.VSTS.Scheduling.CompletedWork", value: "$minutes / 60" }   # minutos → horas (2 casas; ex.: 90 → 1.5)
      - when: "$note != null"
        tool: wit_add_work_item_comment   # aprendizado da implementação ([factory:note])
        args: { project: "{binding.project}", workItemId: "$task_id", comment: "$note", format: "Markdown" }
    returns: ok

  comment_feature:                        # trilha do ciclo: design.md, closure-notes.md
    tool: wit_add_work_item_comment
    args: { project: "{binding.project}", workItemId: "$feature_id", comment: "$body", format: "Markdown" }

  update_body:                            # re-projeção da descrição (espelho) — identidade é tag, descrição fica limpa
    tool: wit_update_work_item
    args:
      id: "$item_id"
      updates:
        - { op: "add", path: "/fields/System.Description", value: "$body" }
    returns: ok

  read_item:                              # leitura para o no-op do update_body (comparar descrição atual)
    tool: wit_get_work_item
    args: { id: "$item_id", project: "{binding.project}" }

  read_comments:                          # leitura para o ensure-por-marcador do comment_feature
    tool: wit_list_work_item_comments
    args: { project: "{binding.project}", workItemId: "$item_id" }

  link_related:
    tool: wit_work_items_link
    args:
      project: "{binding.project}"
      updates:                            # wit_work_items_link.updates = LISTA de {id, linkToId, type, comment?}
        - { id: "$feature_id", linkToId: "$related_id", type: "related" }

  tag_feature:                            # Tag é SET, não patch: o board-writer lê as tags atuais (read_item) e regrava o conjunto
    tool: wit_update_work_item
    args:
      id: "$feature_id"
      updates:
        - { op: "add", path: "/fields/System.Tags", value: "$tags_merged" }   # $tags_merged = tags atuais + $tag (sep. "; "), preservando as existentes

  read_board:                             # /sync: varre por prefixo de identidade + hidrata em batch
    # Epics/Features apenas — tasks NÃO carregam factory-key e não aparecem aqui (ver read_tasks)
    tool: search_workitem
    args: { searchText: "factory-key:", project: ["{binding.project}"] }
    then:
      - tool: wit_get_work_items_batch_by_ids
        args: { project: "{binding.project}", ids: "$result_ids" }

  read_tasks:                             # tasks pela RELAÇÃO parent — nunca por filtro de key
    tool: wit_get_work_item
    args: { id: "$feature_id", project: "{binding.project}", expand: "relations" }
    then:
      - tool: wit_get_work_items_batch_by_ids
        args: { project: "{binding.project}", ids: "$child_ids" }   # filhos via System.LinkTypes.Hierarchy-Forward

  wiki_publish_page:                      # capability wiki: native (opt-in — default da factory é repo-markdown)
    tool: wiki_create_or_update_page
    args: { project: "{binding.project}", wikiIdentifier: "{binding.wiki_id}", path: "$root/$slug", content: "$content" }

  wiki_read_index:
    tool: wiki_list_pages
    args: { project: "{binding.project}", wikiIdentifier: "{binding.wiki_id}" }

capabilities:
  hierarchy: native                       # Epic > Feature > User Story via add_child / parent links
  tasks: native                           # task canônica = User Story filha da Feature — nativa e VISÍVEL no board (ADAPTER.md §4)
  states: validate-only                   # estados custom vivem no processo herdado (conduzido pelo /setup via prerequisites:); MCP não os cria
  identity: tag                           # factory-key como System.Tags — dinâmica, nada a provisionar
  stage_label: none                       # 6 estados exatos do processo Factory — o System.State é o contrato; marcador só em provider que colapsa estados
  time: field                             # CompletedWork (horas) na User Story — campo adicionado ao WIT no processo Factory (ADMIN-SETUP §2.2; ADAPTER.md §4)
  related: native                         # wit_work_items_link
  tags: native                            # tags do ADO são criadas ao aplicar
  search: required                        # find_by_key depende do domínio search (Work Item Search)
  wiki: native                            # ADO Wiki via wiki_create_or_update_page (opt-in)
